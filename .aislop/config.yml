# aislop (AI-slop gate) config.
# The gate runs the @schoen/aislop 0.12.3 fork (lockfile-pinned; `npm run
# lint:aislop`). 0.12.3 supports per-rule severity overrides
# (rules: {"<rule>": error|warning|off}) plus exclude/include globs, engine
# toggles, and ci.failBelow -- but overrides are repo-wide, not per-file, so
# house policy is restructure-first (see AGENTS.md); none are set here.
#
# After the cleanup pass the repo scores 100/100. failBelow is set to 90 as a
# "stay healthy" floor with a little headroom (one stray finding won't break
# CI, but a real regression cluster will). `aislop ci .` runs in CI and exits
# non-zero below this score.
ci:
  failBelow: 90
